name: Deploy Agora to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build agora
        # GitHub Pages serves from `<user>.github.io/<repo>/`. The build needs to
        # know that base path so the asset URLs and the manifest scope resolve
        # correctly. `actions/configure-pages` exposes the right value.
        env:
          PORT: "8080"
          BASE_PATH: ${{ steps.pages.outputs.base_path }}/
          NODE_ENV: production
        run: pnpm --filter @workspace/agora run build

      - name: Inject 404 fallback for HashRouter
        # GitHub Pages doesn't rewrite unknown paths to index.html; HashRouter
        # avoids that for normal navigation but a 404.html copy keeps deep
        # links to /<repo>/anything working before the SPA boots.
        run: cp artifacts/agora/dist/public/index.html artifacts/agora/dist/public/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/agora/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
